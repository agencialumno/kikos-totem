<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kikos - Painel do Atendente</title>
  <link rel="stylesheet" href="css/painel.css">
</head>
<body>

  <header class="painel-header">
    <img src="assets/images/logo.png" alt="Kikos" class="logo">
    <div class="painel-titulo">
      <h1>Painel do Atendente</h1>
      <span id="total-aguardando">0 pedidos aguardando</span>
    </div>
  </header>

  <main class="painel-conteudo">

    <div class="coluna" id="coluna-aguardando">
      <div class="coluna-header aguardando">
        <h2>⏳ Aguardando</h2>
      </div>
      <div class="lista-pedidos" id="lista-aguardando">
        <p class="sem-pedidos">Nenhum pedido aguardando</p>
      </div>
    </div>

    <div class="coluna" id="coluna-em-atendimento">
      <div class="coluna-header em-atendimento">
        <h2>🔧 Em atendimento</h2>
      </div>
      <div class="lista-pedidos" id="lista-em-atendimento">
        <p class="sem-pedidos">Nenhum pedido em atendimento</p>
      </div>
    </div>

    <div class="coluna" id="coluna-concluido">
      <div class="coluna-header concluido">
        <h2>✅ Concluídos</h2>
      </div>
      <div class="lista-pedidos" id="lista-concluido">
        <p class="sem-pedidos">Nenhum pedido concluído</p>
      </div>
    </div>

  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/painel.js"></script>
</body>
</html>
